allowBuilds:
  '@swc/core': false
  protobufjs: false
onlyBuiltDependencies:
  - '@swc/core'
  - protobufjs
# @grafana/ui@13.0.1 transitively depends on react-data-grid resolved from a
# git repository. Since pnpm 10.26 (blockExoticSubdeps), exotic subdependencies
# are blocked by default. Disable that here so installs succeed.
blockExoticSubdeps: false
overrides:
  serialize-javascript: '>=7.0.5'
  js-cookie: '>=3.0.6'
