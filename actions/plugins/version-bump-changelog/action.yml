name: Generate version bump changelog
description: |
  Bump npm version, create a git tag and optionally generate a changelog using the generate-changelog npm package.

  By default, changes are committed and pushed to main with a new git tag.
  This direct-to-main flow is only suitable for private Grafana repositories; public Grafana repositories
  have a branch ruleset on main that requires a pull request, so use create-pr: true for those repos.

  When create-pr is true, changes are committed to a release branch and a pull request is opened instead;
  the calling workflow should tag on merge (see examples/extra/version-bump-changelog.yml).

  Direct-to-main commits are created as verified GitHub App commits via the GitHub Git Data API.
  Release PRs use peter-evans/create-pull-request with sign-commits for verified bot commits.

inputs:
  version:
    description: "Semver type of new version (major / minor / patch)"
    required: true
    type: choice
    options:
      - patch
      - minor
      - major
  generate-changelog:
    description: "Generate changelog"
    required: false
    type: boolean
    default: true
  create-pr:
    description: "Open a release PR instead of committing directly to main (required for public Grafana repos)"
    required: false
    type: boolean
    default: false
  exclude-from-changelog:
    description: "List of commit types to exclude from CHANGELOG"
    required: false
    type: string
    default: "skip,no-changelog"

outputs:
  new-version:
    description: The new semver version (with v prefix)
    value: ${{ steps.bump.outputs.new-version }}
  pull-request-url:
    description: URL of the created PR (only when create-pr is true)
    value: ${{ steps.create-pr.outputs.pull-request-url }}

runs:
  using: composite
  steps:
    - name: Generate GitHub token
      id: generate-github-token
      uses: grafana/shared-workflows/actions/create-github-app-token@259ba21cb3ff07724f331e26d926d655d24b317b # create-github-app-token/v0.2.3
      with:
        github_app: grafana-plugins-platform-bot
        permission_set: version-bump-changelog

    - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      with:
        token: ${{ steps.generate-github-token.outputs.token }}
        persist-credentials: true
        fetch-depth: 0

    - name: Get previous tag before bumping
      id: previous-tag
      if: ${{ inputs.generate-changelog == 'true' }}
      shell: bash
      run: |
        PREVIOUS_TAG=$(git describe --tags --abbrev=0 2>/dev/null || echo "v0.0.0")
        echo "previous-tag=${PREVIOUS_TAG}" >> $GITHUB_OUTPUT

    - name: Bump version
      id: bump
      shell: bash
      run: |
        NEW_VERSION=$(npm version ${INPUT_VERSION} --no-git-tag-version)
        echo "new-version=${NEW_VERSION}" >> $GITHUB_OUTPUT
      env:
        INPUT_VERSION: ${{ inputs.version }}
        GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}

    - name: Generate changelog
      if: ${{ inputs.generate-changelog == 'true' }}
      shell: bash
      run: |
        # Generate changelog
        if [[ "${PREVIOUS_TAG}" == "v0.0.0" ]]; then
          echo "No previous tag found ${PREVIOUS_TAG}, generating changelog for initial version only: v${NEW_VERSION}"
          # For initial version, get all commits up to HEAD
          npx generate-changelog -t HEAD --exclude "${EXCLUDE_STRING}"
        else
          echo "Generating changelog from ${PREVIOUS_TAG} to HEAD"
          npx generate-changelog -t ${PREVIOUS_TAG}...HEAD --exclude "${EXCLUDE_STRING}"
        fi

        # Remove existing "Changelog" header anywhere in the file
        sed -i '/^#\sChangelog$/Id' CHANGELOG.md
        # Prepend the header to the top of the file
        printf "# Changelog\n\n" | cat - CHANGELOG.md > temp && mv temp CHANGELOG.md
        # Format headers remove dates and unreleased
        sed -i -E 's/^(#+ [0-9]+\.[0-9]+\.[0-9]+) \(([Uu]nreleased|[0-9]{4}-[0-9]{2}-[0-9]{2})\)/\1/' CHANGELOG.md
        # Format version headers to use ## instead of #### to match the GitHub release notes format in parse-changelog.sh
        sed -i -E 's/^#### ([0-9]+\.[0-9]+\.[0-9]+.*)$/## \1/' CHANGELOG.md

      env:
        GITHUB_TOKEN: ${{ steps.generate-github-token.outputs.token }}
        PREVIOUS_TAG: ${{ steps.previous-tag.outputs.previous-tag }}
        NEW_VERSION: ${{ steps.bump.outputs.new-version }}
        EXCLUDE_STRING: ${{ inputs.exclude-from-changelog }}

    - name: Commit and push to main
      if: ${{ inputs.create-pr != 'true' }}
      id: commit-main
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        github-token: ${{ steps.generate-github-token.outputs.token }}
        script: |
          const fs = require('fs');
          const path = require('path');
          const { execSync } = require('child_process');

          const owner = context.repo.owner;
          const repo = context.repo.repo;
          const ws = process.env.GITHUB_WORKSPACE;
          const ref = 'heads/main';
          const message = process.env.COMMIT_MESSAGE;
          const allowedFiles = new Set([
            'package.json',
            'package-lock.json',
            'yarn.lock',
            'pnpm-lock.yaml',
            'CHANGELOG.md',
          ]);

          const changed = execSync('git diff --name-only', { cwd: ws, encoding: 'utf8' })
            .trim()
            .split('\n')
            .filter((file) => file && allowedFiles.has(file));

          if (changed.length === 0) {
            core.setFailed('No version bump files to commit');
            return;
          }

          const { data: baseRef } = await github.rest.git.getRef({ owner, repo, ref });
          const parentSha = baseRef.object.sha;
          const { data: parentCommit } = await github.rest.git.getCommit({
            owner,
            repo,
            commit_sha: parentSha,
          });

          const tree = [];
          for (const file of changed) {
            const content = fs.readFileSync(path.join(ws, file));
            const { data: blob } = await github.rest.git.createBlob({
              owner,
              repo,
              content: content.toString('base64'),
              encoding: 'base64',
            });
            tree.push({ path: file, mode: '100644', type: 'blob', sha: blob.sha });
          }

          const { data: newTree } = await github.rest.git.createTree({
            owner,
            repo,
            base_tree: parentCommit.tree.sha,
            tree,
          });

          const { data: commit } = await github.rest.git.createCommit({
            owner,
            repo,
            message,
            tree: newTree.sha,
            parents: [parentSha],
          });

          await github.rest.git.updateRef({ owner, repo, ref, sha: commit.sha });
          core.setOutput('commit-sha', commit.sha);
      env:
        COMMIT_MESSAGE: "chore(version): bump version to ${{ steps.bump.outputs.new-version }}"

    - name: Prepare pull request
      if: ${{ inputs.create-pr == 'true' }}
      id: release-branch
      shell: bash
      run: |
        RELEASE_VERSION="${NEW_VERSION#v}"
        echo "branch=release/${RELEASE_VERSION}" >> "$GITHUB_OUTPUT"
        if [[ "${GENERATE_CHANGELOG}" == "true" ]] && [[ -f CHANGELOG.md ]]; then
          awk '/^## / { if (section) exit; section=1 } section { print }' CHANGELOG.md > /tmp/pr-body.md
        else
          printf "Version bump to %s\n" "${NEW_VERSION}" > /tmp/pr-body.md
        fi

        ADD_PATHS="package.json"
        for lockfile in package-lock.json yarn.lock pnpm-lock.yaml; do
          if [[ -f "${lockfile}" ]]; then
            ADD_PATHS="${ADD_PATHS}"$'\n'"${lockfile}"
          fi
        done
        if [[ "${GENERATE_CHANGELOG}" == "true" ]] && [[ -f CHANGELOG.md ]]; then
          ADD_PATHS="${ADD_PATHS}"$'\n'"CHANGELOG.md"
        fi
        {
          echo 'add-paths<<EOF'
          printf '%s\n' "${ADD_PATHS}"
          echo 'EOF'
        } >> "$GITHUB_OUTPUT"
      env:
        GENERATE_CHANGELOG: ${{ inputs.generate-changelog }}
        NEW_VERSION: ${{ steps.bump.outputs.new-version }}

    - name: Create pull request
      if: ${{ inputs.create-pr == 'true' }}
      id: create-pr
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        token: ${{ steps.generate-github-token.outputs.token }}
        sign-commits: true
        branch: ${{ steps.release-branch.outputs.branch }}
        base: main
        add-paths: ${{ steps.release-branch.outputs.add-paths }}
        commit-message: "chore(version): bump version to ${{ steps.bump.outputs.new-version }}"
        title: "chore(version): release ${{ steps.bump.outputs.new-version }}"
        body-path: /tmp/pr-body.md

    - name: Create git tag
      if: ${{ inputs.create-pr != 'true' }}
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        github-token: ${{ steps.generate-github-token.outputs.token }}
        script: |
          const tag = process.env.NEW_VERSION;
          const ref = `refs/tags/${tag}`;
          const sha = process.env.COMMIT_SHA;

          if (!sha) {
            core.setFailed(
              `Cannot create tag ${tag}: missing commit SHA from the version bump commit step. ` +
              `The release tag was not created.`
            );
            return;
          }

          try {
            await github.rest.git.createRef({
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref,
              sha,
            });
            core.info(`Created tag ${tag} at ${sha}`);
          } catch (error) {
            const message = error.response?.data?.message || error.message;

            if (error.status === 422 && message.includes('already exists')) {
              const { data: existingRef } = await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });

              if (existingRef.object.sha === sha) {
                core.warning(`Tag ${tag} already exists at ${sha}; treating as success.`);
                return;
              }

              core.setFailed(
                `Tag ${tag} already exists at ${existingRef.object.sha}, expected ${sha}. ` +
                `The version bump commit was created but the tag points to a different commit. ` +
                `Delete the existing tag or bump to a new version before re-running.`
              );
              return;
            }

            core.setFailed(
              `Failed to create tag ${tag} at ${sha}: ${message}. ` +
              `The version bump commit was created but the release tag was not created.`
            );
            throw error;
          }
      env:
        NEW_VERSION: ${{ steps.bump.outputs.new-version }}
        COMMIT_SHA: ${{ steps.commit-main.outputs.commit-sha }}
