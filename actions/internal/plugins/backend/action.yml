name: Plugins - Backend - Test and build
description: Tests, lints and builds the backend.

inputs:
  github-token:
    description: GitHub token for downloading dependencies from private repos, if necessary
    required: true
  plugin-directory:
    description: Directory of the plugin, if not in the root of the repository.
    required: false
    default: .
  secrets:
    required: false
    type: string
    description: The secrets to use within frontend steps
  race-detector:
    required: false
    type: boolean
    description: Whether to run the tests with the race detector
    default: "true"
  build-target:
    required: false
    type: string
    description: Custom mage target to use for building the backend. Defaults to "buildAll". Useful for building for custom architectures not supported in the SDK yet, such as s390x or Windows ARM64.
    default: buildAll

runs:
  using: composite
  steps:
    - name: Config git to use GitHub token
      run: git config --global url."https://oauth2:${INPUT_GITHUB_TOKEN}@github.com/".insteadOf "https://github.com/"
      env:
        INPUT_GITHUB_TOKEN: ${{ inputs.github-token }}
      shell: bash

    - name: Get secrets from Vault
      if: inputs.secrets != ''
      id: get-secrets
      uses: grafana/shared-workflows/actions/get-vault-secrets@f1614b210386ac420af6807a997ac7f6d96e477a # get-vault-secrets/v1.3.1
      with:
        repo_secrets: ${{ inputs.secrets }}

    - name: Install dependencies
      run: go mod download
      working-directory: ${{ inputs.plugin-directory }}
      shell: bash

    - name: Lint
      run: golangci-lint run --timeout=5m
      working-directory: ${{ inputs.plugin-directory }}
      shell: bash

    - name: Test
      run: |
        if [ "$RACE_DETECTOR" = "true" ]; then
          mage -v testRace
        else
          mage -v test
        fi
      working-directory: ${{ inputs.plugin-directory }}
      shell: bash
      env:
        RACE_DETECTOR: ${{ inputs.race-detector }}

    - name: Build
      run: mage -v ${BUILD_TARGET}
      working-directory: ${{ inputs.plugin-directory }}
      shell: bash
      env:
        BUILD_TARGET: ${{ inputs.build-target }}
