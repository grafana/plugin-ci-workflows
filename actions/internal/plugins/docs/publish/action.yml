name: Plugins - Docs - Publish
description: Publishes docs to the website

inputs:
  id:
    description: Plugin ID
    required: true
  version:
    description: Plugin version
    required: true
  github-token:
    description: GitHub token for publishing to the website repository
    required: true
  via-pr:
    description: |
      When true (default), docs are published to grafana/website by opening a
      pull request: the changes are committed to a new branch via the GitHub
      API (so the commit is signed and shows as "Verified"), a PR is opened
      against the default branch, and auto-merge is enabled. This avoids pushing
      directly to a protected branch, which violates org policy.

      When false, the legacy method is used: a local git commit pushed directly
      to the website repository's default branch, which produces unsigned
      commits. Avoid the legacy method: it pushes directly to a protected
      branch and does not comply with the SDLC policies that require signed
      commits via a PR. It will be removed in the future.
    default: "true"

runs:
  using: composite
  steps:
    # Legacy method: local git commit pushed directly to the website repository.
    # Produces unsigned commits and bypasses code review. Kept for backwards
    # compatibility only.
    - name: Publish docs (legacy, unsigned direct push)
      if: ${{ inputs.via-pr == 'false' }}
      run: |
        ${{ github.action_path }}/script.sh ${PLUGIN_ID} ${PLUGIN_VERSION}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PLUGIN_ID: ${{ inputs.id }}
        PLUGIN_VERSION: ${{ inputs.version }}
      shell: bash

    # PR method (default): clone the website repo and rsync the docs into place,
    # then create the commit via the GitHub API (so it is signed and shows as
    # "Verified") on a new branch, open a PR, and enable auto-merge.
    - name: Prepare docs
      id: prepare
      if: ${{ inputs.via-pr != 'false' }}
      run: |
        ${{ github.action_path }}/prepare.sh ${PLUGIN_ID} ${PLUGIN_VERSION}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PLUGIN_ID: ${{ inputs.id }}
        PLUGIN_VERSION: ${{ inputs.version }}
      shell: bash

    - name: Publish docs (PR)
      if: ${{ inputs.via-pr != 'false' }}
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      with:
        github-token: ${{ steps.prepare.outputs.token }}
        script: |
          const fs = require('fs');
          const path = require('path');

          const owner = 'grafana';
          const repo = 'website';
          const dir = process.env.WEBSITE_DIR;
          const opts = { cwd: dir };

          // Collect the changes staged by the prepare step.
          const { stdout: statusOut } = await exec.getExecOutput('git', ['status', '--porcelain'], opts);
          const additions = [];
          const deletions = [];
          for (const line of statusOut.split('\n')) {
            if (!line.trim()) continue;
            const status = line.slice(0, 2).trim();
            const filePath = line.slice(3);
            if (status === 'D') {
              deletions.push({ path: filePath });
            } else {
              additions.push({ path: filePath, contents: fs.readFileSync(path.join(dir, filePath)).toString('base64') });
            }
          }
          if (additions.length === 0 && deletions.length === 0) {
            core.info('No changes to commit');
            return;
          }

          // The clone is shallow on the default branch, so its HEAD is the tip
          // of that branch. Use it as the base for the new branch and the PR.
          const { stdout: headOidRaw } = await exec.getExecOutput('git', ['rev-parse', 'HEAD'], opts);
          const baseOid = headOidRaw.trim();
          const { stdout: baseBranchRaw } = await exec.getExecOutput(
            'git', ['rev-parse', '--abbrev-ref', 'HEAD'], opts);
          const baseBranch = baseBranchRaw.trim();

          const branch = `plugins-docs/${process.env.PLUGIN_ID}-v${process.env.PLUGIN_VERSION}-${process.env.RUN_ID}-${process.env.RUN_ATTEMPT}`;
          const ref = `refs/heads/${branch}`;

          // Create the branch off the default branch tip. If a previous attempt
          // already created it, reset it to the current base instead.
          try {
            await github.rest.git.createRef({ owner, repo, ref, sha: baseOid });
          } catch (err) {
            if (err.status === 422) {
              core.info(`Branch ${branch} already exists, updating it`);
              await github.rest.git.updateRef({
                owner, repo, ref: `heads/${branch}`, sha: baseOid, force: true,
              });
            } else {
              throw err;
            }
          }

          // Create the commit via the API so it is signed and shows as "Verified".
          const commitResult = await github.graphql(
            `mutation ($input: CreateCommitOnBranchInput!) {
              createCommitOnBranch(input: $input) {
                commit { oid url }
              }
            }`,
            {
              input: {
                branch: {
                  repositoryNameWithOwner: `${owner}/${repo}`,
                  branchName: branch,
                },
                expectedHeadOid: baseOid,
                message: { headline: process.env.COMMIT_MESSAGE },
                fileChanges: { additions, deletions },
              },
            },
          );
          core.info(`Created commit: ${commitResult.createCommitOnBranch.commit.url}`);

          const { data: pr } = await github.rest.pulls.create({
            owner, repo,
            head: branch,
            base: baseBranch,
            title: process.env.PR_TITLE,
            body: process.env.PR_BODY,
          });
          core.info(`Opened PR: ${pr.html_url}`);

          // Enable auto-merge so the PR merges once required checks/reviews pass.
          // This requires auto-merge to be enabled on the repository; if it is
          // not, log a warning and leave the PR open rather than failing.
          try {
            await github.graphql(
              `mutation ($pullRequestId: ID!) {
                enablePullRequestAutoMerge(input: { pullRequestId: $pullRequestId, mergeMethod: SQUASH }) {
                  pullRequest { autoMergeRequest { enabledAt } }
                }
              }`,
              { pullRequestId: pr.node_id },
            );
            core.info('Enabled auto-merge');
          } catch (err) {
            core.warning(`Could not enable auto-merge, leaving PR open for manual merge: ${err.message}`);
          }
      env:
        WEBSITE_DIR: ${{ steps.prepare.outputs.dir }}
        PLUGIN_ID: ${{ inputs.id }}
        PLUGIN_VERSION: ${{ inputs.version }}
        RUN_ID: ${{ github.run_id }}
        RUN_ATTEMPT: ${{ github.run_attempt }}
        COMMIT_MESSAGE: "[plugins] Publish from ${{ github.repository }}:${{ github.ref_name }}/docs/sources"
        PR_TITLE: "[plugins] Publish docs for ${{ inputs.id }} v${{ inputs.version }}"
        PR_BODY: "Automated docs publish for `${{ inputs.id }}` v${{ inputs.version }} from ${{ github.repository }}@${{ github.ref_name }} (run ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
