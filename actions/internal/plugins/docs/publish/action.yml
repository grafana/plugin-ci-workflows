name: Plugins - Docs - Publish
description: Publishes docs to the website

inputs:
  id:
    description: Plugin ID
    required: true
  version:
    description: Plugin version
    required: true
  github-token:
    description: GitHub token for publishing to the website repository
    required: true
  via-pr:
    description: |
      When true (default), docs are published to grafana/website by opening a
      pull request: the changes are committed to a new branch via the GitHub
      API (so the commit is signed and shows as "Verified"), a PR is opened
      against the default branch, and auto-merge is enabled. This avoids pushing
      directly to a protected branch, which violates org policy.

      When false, the legacy method is used: a local git commit pushed directly
      to the website repository's default branch, which produces unsigned
      commits. Avoid the legacy method: it pushes directly to a protected
      branch and does not comply with the SDLC policies that require signed
      commits via a PR. It will be removed in the future.
    default: "true"

runs:
  using: composite
  steps:
    # Legacy method: local git commit pushed directly to the website repository.
    # Produces unsigned commits and bypasses code review. Kept for backwards
    # compatibility only.
    - name: Publish docs (legacy, unsigned direct push)
      if: ${{ inputs.via-pr == 'false' }}
      run: |
        ${{ github.action_path }}/script.sh ${PLUGIN_ID} ${PLUGIN_VERSION}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PLUGIN_ID: ${{ inputs.id }}
        PLUGIN_VERSION: ${{ inputs.version }}
      shell: bash

    # PR method (default): clone the website repo and rsync the docs into place,
    # then let create-pull-request commit the changes via the GitHub API (so the
    # commit is signed and shows as "Verified"), open a PR, and enable auto-merge.
    - name: Prepare docs
      id: prepare
      if: ${{ inputs.via-pr != 'false' }}
      run: |
        ${{ github.action_path }}/prepare.sh ${PLUGIN_ID} ${PLUGIN_VERSION}
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        PLUGIN_ID: ${{ inputs.id }}
        PLUGIN_VERSION: ${{ inputs.version }}
      shell: bash

    # create-pull-request commits the rsync'd changes via the GitHub API
    # (sign-commits: true), so the commit is signed and shows as "Verified". It
    # creates/updates the branch and opens (or updates) the PR.
    - name: Publish docs (PR)
      id: cpr
      if: ${{ inputs.via-pr != 'false' }}
      uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
      with:
        token: ${{ steps.prepare.outputs.token }}
        path: ${{ steps.prepare.outputs.dir }}
        base: master
        branch: plugins-docs/${{ inputs.id }}-v${{ inputs.version }}
        delete-branch: true
        sign-commits: true
        commit-message: "[plugins] Publish from ${{ github.repository }}:${{ github.ref_name }}/docs/sources"
        title: "[plugins] Publish docs for ${{ inputs.id }} v${{ inputs.version }}"
        body: |
          Automated docs publish for `${{ inputs.id }}` v${{ inputs.version }}
          from `${{ github.repository }}@${{ github.ref_name }}`.

          _This is an automated PR created by the `${{ github.workflow }}` workflow ([run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}))._

    # Enable auto-merge so the PR merges once required checks/reviews pass. This
    # requires auto-merge to be enabled on the repository; if it is not, log a
    # warning and leave the PR open rather than failing. gh is not bundled in
    # the docs-base image, so install it first.
    - name: Enable auto-merge
      if: ${{ inputs.via-pr != 'false' && steps.cpr.outputs.pull-request-number }}
      run: |
        apk add --no-cache github-cli
        gh pr merge --auto --squash "${PR_NUMBER}" --repo grafana/website \
          || echo "::warning::Could not enable auto-merge; PR left open for manual merge"
      env:
        GH_TOKEN: ${{ steps.prepare.outputs.token }}
        PR_NUMBER: ${{ steps.cpr.outputs.pull-request-number }}
      shell: sh
