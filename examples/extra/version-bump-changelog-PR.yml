# Creates a PR to bump the npm version, creates a git tag once the PR is merged and optionally generates a changelog
# entry using conventional commits.
#
# This example opens a release pull request instead of committing directly to main
# (create-pr: true). Use this setup for public Grafana repositories, and for any
# repo with a branch ruleset that requires a pull request before updating main.
# On workflow_dispatch the action bumps the version and opens a release/* PR; the
# pull_request closed trigger below creates the git tag when that PR merges. The
# action no-ops on other closed PRs (no GATB token or checkout).
#
# For private repos without a PR requirement on main, see version-bump-changelog.yml.
#
# IMPORTANT: This workflow requires the `grafana-plugins-platform-bot` GitHub App
# to have permissions on your repository and GATB (GitHub App Token Broker) setup in deployment_tools.
# Before using it, request permissions by following the instructions here:
#   https://enghub.grafana-ops.net/docs/default/component/grafana-plugins-platform/plugins-ci-github-actions/035-github-app-permissions
# Skipping this step will cause this workflow to fail.

name: Version bump, changelog

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Semver type of new version (major / minor / patch)"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major
      generate-changelog:
        description: "Generate changelog"
        required: false
        type: boolean
        default: true
      create-pr:
        description: "Open a release PR instead of committing directly to main (required for public Grafana repos)"
        required: false
        type: boolean
        default: true
  pull_request:
    types: [closed]
    branches: [main]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  version-bump-changelog:
    runs-on: ubuntu-x64-small

    steps:
      - name: Version bump
        uses: grafana/plugin-ci-workflows/actions/plugins/version-bump-changelog@plugins-version-bump-changelog/v2.0.0
        with:
          generate-changelog: ${{ inputs.generate-changelog }}
          version: ${{ inputs.version }}
          create-pr: ${{ inputs.create-pr }}
