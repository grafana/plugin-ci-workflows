# Description:
# Run Playwright E2E tests for the plugin.
# The plugin must be built via the "ci" workflow and available as a GitHub artifact before running this workflow.

name: Plugins - Playwright E2E tests

on:
  workflow_call:
    inputs:
      id:
        description: Plugin ID
        type: string
        required: true
      version:
        description: Plugin version
        type: string
        required: true
      gar-registry:
        type: string
        required: false
      plugin-directory:
        description: Directory of the plugin, if not in the root of the repository.
        type: string
        required: false
        default: .
      # https://github.com/grafana/plugin-actions/blob/main/e2e-version/action.yml
      skip-grafana-nightly-image:
        default: false
        required: false
        type: boolean
        description: Optionally, you can skip the Grafana nightly image
      skip-grafana-dev-image:
        default: false
        required: false
        type: boolean
        description: "Deprecated: use skip-grafana-nightly-image instead"
      version-resolver-type:
        required: false
        type: string
        default: plugin-grafana-dependency
      grafana-dependency:
        required: false
        type: string
      upload-artifacts:
        required: false
        type: boolean
        default: false
      report-path:
        required: false
        type: string
        description: Path to the folder to use to upload the artifacts
        default: playwright-report/
      docker-compose-file:
        required: false
        type: string
        description: Path to the docker-compose file to use for testing
      playwright-config:
        required: false
        type: string
        default: playwright.config.ts
        description: Path to the Playwright config file to use for testing
      secrets:
        required: false
        type: string
        description: The secrets to use for Playwright tests
      grafana-url:
        description: The Grafana URL to wait for before running the tests
        type: string
        required: false
        default: http://localhost:3000/
      grafana-timeout:
        description: |
          Seconds to wait for the HTTP endpoint check before timing out.
          This maps to wait-for-grafana's `timeout` input.
        type: number
        required: false
        default: 60
      grafana-startup-timeout:
        description: |
          Seconds to wait for Grafana startup before beginning endpoint checks.
          This maps to wait-for-grafana's `startupTimeout` input.
        type: number
        required: false
        default: 60
      max-parallel:
        description: |
          Maximum number of matrix jobs to run in parallel.
          Defaults to 256 effectively unbounded. Lower values stagger Docker image pulls and Grafana
          startup across runners, which can avoid wait-for-grafana flakes.
        required: false
        type: number
        default: 256
      node-version:
        description: Node.js version to use
        type: string
        required: false
      npm-registry-auth:
        description: |
          Whether to authenticate to the npm registry in Google Artifact Registry.
          If true, the root of the plugin repository must contain a `.npmrc` file.
        type: boolean
        required: false
        default: false
      playwright-browsers:
        description: |
          Browsers to install before Playwright E2E tests. Space-, newline-, or semicolon-separated.
          Allowed values: chromium, firefox, webkit. Defaults to chromium (unchanged behaviour).
          Only controls install; which browsers actually run is set in the plugin's playwright.config.ts.
          Enable when CI runs non-Chromium Playwright projects. Example: `chromium firefox` or `chromium;firefox`.
          WebKit install is best-effort when listed (system deps may be missing on self-hosted runners).
        type: string
        required: false
        default: chromium
permissions:
  contents: read
  id-token: write

jobs:
  resolve-versions:
    name: Resolve Grafana images
    runs-on: ubuntu-arm64-small
    timeout-minutes: 3
    outputs:
      matrix: ${{ steps.resolve-versions.outputs.matrix }}
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Resolve Grafana E2E versions
        id: resolve-versions
        uses: grafana/plugin-actions/e2e-version@304ed38a05911eda030608b10ff9ca59616e465c # e2e-version/v3.0.1
        with:
          skip-grafana-nightly-image: ${{ inputs.skip-grafana-nightly-image || inputs.skip-grafana-dev-image }}
          version-resolver-type: ${{ inputs.version-resolver-type }}
          grafana-dependency: ${{ inputs.grafana-dependency }}

  playwright-tests:
    needs: resolve-versions
    timeout-minutes: 60
    strategy:
      fail-fast: false
      max-parallel: ${{ inputs.max-parallel }}
      matrix:
        GRAFANA_IMAGE: ${{fromJson(needs.resolve-versions.outputs.matrix)}}
    name: e2e ${{ matrix.GRAFANA_IMAGE.name }}@${{ matrix.GRAFANA_IMAGE.VERSION }}
    runs-on: ubuntu-x64-large
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Setup
        id: setup
        uses: grafana/plugin-ci-workflows/actions/internal/plugins/setup@plugins-frontend-e2e-against-stack/v1.1.1
        with:
          plugin-directory: ${{ inputs.plugin-directory }}
          node-version: ${{ inputs.node-version }}
          node-version-file: ${{ inputs.plugin-directory }}/.nvmrc
          frontend-only: "true"

      - name: Login to Google Cloud
        if: inputs.npm-registry-auth == true
        uses: google-github-actions/auth@7c6bc770dae815cd3e89ee6cdf493a5fab2cc093 # v3.0.0
        with:
          token_format: access_token
          workload_identity_provider: "projects/304398677251/locations/global/workloadIdentityPools/github/providers/github-provider"
          service_account: github-plugin-ci-workflows@grafanalabs-workload-identity.iam.gserviceaccount.com

      - name: NPM registry auth
        if: inputs.npm-registry-auth == true
        shell: bash
        working-directory: ${{ inputs.plugin-directory }}
        run: GOOGLE_APPLICATION_CREDENTIALS=${{ env.GOOGLE_APPLICATION_CREDENTIALS }} npx google-artifactregistry-auth --credential-config ./.npmrc

      - name: Install npm dependencies
        run: ${{ steps.setup.outputs.node-package-manager-frozen-install-cmd }}
        shell: bash
        working-directory: ${{ inputs.plugin-directory }}

      - name: Get Playwright version
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        id: version
        with:
          script: |
            const workingDirectory = process.env.PLUGIN_DIRECTORY;
            console.debug("Specified working directory:", workingDirectory);
            if (workingDirectory) process.chdir(workingDirectory);
            console.debug("Actual working directory:", process.cwd());
            let version = "";
            try {
              version = require("@playwright/test/package.json").version;
            } catch (error) {
              console.log(error.message);
            }
            console.debug("Version:", version);
            if (version) {
              core.setOutput("version", version);
            } else {
              core.setFailed("Couldn't get Playwright version");
            }
        env:
          PLUGIN_DIRECTORY: ${{ inputs.plugin-directory }}

      - name: Resolve Playwright browsers
        id: browsers
        shell: bash
        env:
          PLAYWRIGHT_BROWSERS: ${{ inputs.playwright-browsers }}
        run: |
          # Input is passed via PLAYWRIGHT_BROWSERS env; each token is validated against the allowlist below.
          set -euo pipefail
          allowed="chromium firefox webkit"
          normalized=$(printf '%s' "$PLAYWRIGHT_BROWSERS" | tr ';\r\n\t,' ' ' | sed 's/  */ /g' | xargs)
          if [ -z "$normalized" ]; then
            normalized="chromium"
          fi
          seen=""
          for token in $normalized; do
            case " $allowed " in
              *" $token "*) ;;
              *)
                echo "::error::Unsupported Playwright browser '$token'. Allowed: chromium, firefox, webkit"
                exit 1
                ;;
            esac
            case " $seen " in
              *" $token "*) continue ;;
            esac
            seen="$seen $token"
          done
          list=$(echo "$seen" | xargs)
          cache_key=$(echo "$list" | tr ' ' '\n' | sort | paste -sd '-' -)
          echo "list=$list" >> "$GITHUB_OUTPUT"
          echo "cache-key=$cache_key" >> "$GITHUB_OUTPUT"

      - name: Cache Playwright
        id: cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ steps.version.outputs.version }}-${{ steps.browsers.outputs.cache-key }}

      - name: Install Playwright browsers
        shell: bash
        env:
          PLAYWRIGHT_BROWSERS_LIST: ${{ steps.browsers.outputs.list }}
          NPM_EXEC_CMD: ${{ steps.setup.outputs.node-package-manager-exec-local-cmd }}
        run: |
          set -euo pipefail
          for token in $PLAYWRIGHT_BROWSERS_LIST; do
            if [ "$token" = "webkit" ]; then
              # WebKit needs system libs that may be missing on self-hosted runners.
              $NPM_EXEC_CMD playwright install --with-deps webkit || echo "::warning::WebKit install failed; continuing"
            else
              $NPM_EXEC_CMD playwright install --with-deps "$token"
            fi
          done

      - name: Download GitHub artifact
        id: download-dist-artifacts
        continue-on-error: true
        uses: actions/download-artifact@018cc2cf5baa6db3ef3c5f8a56943fffe632ef53 # v6.0.0
        with:
          name: dist-artifacts
          path: /tmp/dist-artifacts

      - name: Log unavailable dist-artifacts error
        if: steps.download-dist-artifacts.outcome == 'failure'
        run: |
          echo "::error::The dist-artifacts artifact could not be downloaded. It may have expired. Please re-run the entire workflow from the beginning to rebuild the plugin."
          exit 1
        shell: bash

      - name: Move dist artifacts
        run: |
          rm -rf dist
          mkdir -p dist
          src=$(pwd)

          cd /tmp/dist-artifacts
          # unzip the universal zip
          unzip "${PLUGIN_ID}-${PLUGIN_VERSION}.zip" -d out
          # Folder structure: /tmp/dist-artifacts/out/$PLUGIN_ID/plugin.json
          cd out
          cd "$(ls -1)"
          mv ./* "$src/dist/"
        env:
          PLUGIN_ID: ${{ inputs.id }}
          PLUGIN_VERSION: ${{ inputs.version }}
        working-directory: ${{ inputs.plugin-directory }}

      - name: Get secrets from Vault
        if: inputs.secrets != ''
        id: get-secrets
        uses: grafana/shared-workflows/actions/get-vault-secrets@e46fe1e9a2bf9e618bcf8d8d32f3a7381b45c06d # get-vault-secrets/v2.0.0
        with:
          repo_secrets: ${{ inputs.secrets }}

      - name: Set secrets
        if: inputs.secrets != ''
        run: |
          echo '${{ steps.get-secrets.outputs.secrets }}' | jq -r 'to_entries[] | "\(.key)=\(.value)"' >> .env
        working-directory: ${{ inputs.plugin-directory }}

      # Log in to GAR to allow pulling private Docker images in the docker-compose setup if needed
      - name: Log in to GAR
        if: inputs.gar-registry != ''
        uses: grafana/shared-workflows/actions/login-to-gar@1f541877ceb22c7be7667d8a8df04984aeac9f9d # login-to-gar/v1.0.3
        with:
          registry: ${{ inputs.gar-registry }}

      - name: Start Grafana
        # add the -f argument only if "inputs.docker-compose-file" is defined
        run: |
          GRAFANA_VERSION=${{ matrix.GRAFANA_IMAGE.VERSION }} GRAFANA_IMAGE=${{ matrix.GRAFANA_IMAGE.NAME }} docker compose ${DOCKER_COMPOSE_FILE:+-f "$DOCKER_COMPOSE_FILE"} up -d
        working-directory: ${{ inputs.plugin-directory }}
        env:
          DOCKER_COMPOSE_FILE: ${{ inputs.docker-compose-file }}

      - name: Wait for Grafana to start
        id: wait-for-grafana
        uses: grafana/plugin-actions/wait-for-grafana@wait-for-grafana/v1.0.3
        with:
          url: "${{ inputs.grafana-url }}"
          timeout: "${{ inputs.grafana-timeout }}"
          startupTimeout: "${{ inputs.grafana-startup-timeout }}"

      - name: Capture Grafana logs on startup failure
        if: ${{ failure() && steps.wait-for-grafana.outcome == 'failure' }}
        shell: bash
        working-directory: ${{ inputs.plugin-directory }}
        run: |
          echo "::group::docker compose ps"
          docker compose ${DOCKER_COMPOSE_FILE:+-f "$DOCKER_COMPOSE_FILE"} ps -a || true
          echo "::endgroup::"
          echo "::group::docker compose logs"
          docker compose ${DOCKER_COMPOSE_FILE:+-f "$DOCKER_COMPOSE_FILE"} logs --no-color --tail 500 || true
          echo "::endgroup::"
        env:
          DOCKER_COMPOSE_FILE: ${{ inputs.docker-compose-file }}

      - name: Run Playwright tests
        id: run-tests
        run: ${{ steps.setup.outputs.node-package-manager-exec-local-cmd }} playwright test --config "${PLAYWRIGHT_CONFIG}"
        env:
          PLAYWRIGHT_CONFIG: ${{ inputs.playwright-config }}
        working-directory: ${{ inputs.plugin-directory }}

      - name: Upload artifacts
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        if: ${{ (inputs.upload-artifacts == true) && ((always() && steps.run-tests.outcome == 'success') || (failure() && steps.run-tests.outcome == 'failure')) }}
        with:
          name: playwright-report-${{ matrix.GRAFANA_IMAGE.NAME }}-v${{ matrix.GRAFANA_IMAGE.VERSION }}-${{github.run_id}}
          path: ${{ inputs.plugin-directory }}/${{ inputs.report-path }}
          retention-days: 30

  check-playwright-status:
    needs: playwright-tests
    name: Check Playwright E2E matrix status
    runs-on: ubuntu-arm64-small
    if: always()
    steps:
      - name: Check matrix job status
        uses: grafana/plugin-ci-workflows/actions/internal/check-matrix-status@plugins-frontend-e2e-against-stack/v1.1.1
        with:
          results: ${{ needs.playwright-tests.result }}
