name: Act tests

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  ACT_VERSION: "0.2.89"

permissions:
  contents: read

jobs:
  detect-changes:
    name: Detect changes
    runs-on: ubuntu-arm64-small
    outputs:
      relevant: ${{ steps.changed.outputs.any_changed }}
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: true
          fetch-depth: 2

      - name: Check if restore-rolling-release commit
        id: is-restore
        run: |
          if [[ "${COMMIT_MESSAGE}" == "chore: update references to use 'main' branch" ]] && \
             [[ "${ACTOR}" == "grafana-plugins-platform-bot[bot]" ]]; then
            echo "skip=true" >> "${GITHUB_OUTPUT}"
          else
            echo "skip=false" >> "${GITHUB_OUTPUT}"
          fi
        env:
          COMMIT_MESSAGE: ${{ github.event.head_commit.message }}
          ACTOR: ${{ github.actor }}
        shell: bash

      - name: Check for relevant changes
        id: changed
        if: steps.is-restore.outputs.skip != 'true'
        uses: tj-actions/changed-files@9426d40962ed5378910ee2e21d5f8c6fcbf2dd96 # v47.0.6
        with:
          files: |
            tests/**
            .github/workflows/pr-checks-test-ci.yml
            .github/workflows/ci.yml
            .github/workflows/cd.yml
            actions/internal/**
            actions/plugins/publish/**

  act-tests:
    name: Act tests
    needs: detect-changes
    if: needs.detect-changes.outputs.relevant == 'true'
    runs-on: ubuntu-x64-xlarge-io
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ github.event.pull_request.head.sha || github.ref }}
          fetch-depth: 0
          lfs: true
          submodules: true

      # This is needed otherwise actions/checkout puts the repo in detached head
      # and act complains it cannot determine to which branch the current commit belongs to.
      - name: Checkout branch
        run: |
          git checkout "${REF}"
        env:
          REF: ${{ github.event.pull_request.head.ref || github.ref }}
        shell: bash

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version-file: tests/act/go.mod
          cache-dependency-path: tests/act/go.sum

      # TODO: introduce some caching for act tool cache docker volume and nektos/act docker image

      - name: Run act tests
        run: |
          make act-tests
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  act-tests-result:
    name: Act tests result
    if: always()
    needs:
      - detect-changes
      - act-tests
    runs-on: ubuntu-arm64-small
    steps:
      - name: Check result
        run: |
          if [[ "${TESTS_RESULT}" == "failure" ]]; then
            echo "Act tests failed"
            exit 1
          fi
          echo "Act tests passed (result: ${TESTS_RESULT}, relevant changes: ${RELEVANT})"
        env:
          TESTS_RESULT: ${{ needs.act-tests.result }}
          RELEVANT: ${{ needs.detect-changes.outputs.relevant }}
