name: Lint GitHub Actions workflows
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  ACTIONLINT_VERSION: "1.7.12"
  GOLANGCI_LINT_VERSION: "2.12.2"

jobs:
  actionlint:
    runs-on: ubuntu-arm64-small
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0
        with:
          persist-credentials: false
      - name: Enable action lint matcher
        run: echo "::add-matcher::.github/actionlint-matcher.json"
      - name: Download actionlint
        id: get_actionlint
        run: |
          bash <(curl "https://raw.githubusercontent.com/rhysd/actionlint/v${ACTIONLINT_VERSION}/scripts/download-actionlint.bash") "${ACTIONLINT_VERSION}" "/usr/local/bin"
        shell: bash
        env:
          ACTIONLINT_VERSION: ${{ env.ACTIONLINT_VERSION }}
      - name: Check workflow files
        run: |
          actionlint -color
        shell: bash

  lint:
    name: Lint ${{ matrix.directory }}
    runs-on: ubuntu-arm64-small
    strategy:
      fail-fast: false
      matrix:
        directory:
          - tests/act
          - examples/base
    steps:
      - name: Checkout
        uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6.1.0

      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6.5.0
        with:
          go-version-file: ${{ matrix.directory }}/go.mod
          cache-dependency-path: ${{ matrix.directory == 'tests/act' && 'tests/act/go.sum' || '' }}

      - name: golangci-lint
        uses: golangci/golangci-lint-action@ba0d7d2ec06a0ea1cb5fa41b2e4a3ab91d21278a # v9.3.0
        with:
          version: v${{ env.GOLANGCI_LINT_VERSION }}
          working-directory: ${{ matrix.directory }}
